name: 扫描APP在线打包APK
on:
  # 推送到main分支自动打包
  push:
    branches: [ main ]
  # 支持手动点击触发打包
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取项目代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 配置JDK17（安卓编译必需，固定版本）
      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 给gradlew执行权限（Linux环境必需）
      - name: 赋予gradlew执行权限
        run: chmod +x gradlew

      # 编译打包Debug APK（用项目匹配的gradle版本，输出详细日志方便排查）
      - name: 编译打包APK
        run: ./gradlew assembleDebug --stacktrace

      # 上传打包好的APK产物
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMaster-扫描王-APK
          path: app/build/outputs/apk/debug/*.apk
