name: 扫描APP在线打包APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 配置Gradle 8.2
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.2"
          cache: true

      - name: 编译打包APK
        run: gradle assembleDebug --stacktrace --offline=false

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMaster-扫描王-APK
          path: app/build/outputs/apk/debug/*.apk
