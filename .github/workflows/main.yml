name: 扫描APP在线打包APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 2. 配置JDK17（安卓编译必需）
      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. 配置Gradle环境（自动安装gradle，无需本地文件）
      - name: 配置Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.2"
          cache: true

      # 4. 编译APK（直接用gradle命令，不依赖gradlew）
      - name: 编译打包APK
        run: gradle assembleDebug --stacktrace

      # 5. 上传打包好的APK
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMaster-扫描王-APK
          path: app/build/outputs/apk/debug/*.apk
