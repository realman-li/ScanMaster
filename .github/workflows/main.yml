name: 扫描APP在线打包APK
on:
  # 推送代码到main分支自动打包
  push:
    branches: [ main ]
  # 支持手动点击触发打包
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 拉取项目代码
      - name: 拉取代码
        uses: actions/checkout@v4

      # 配置JDK17（安卓编译必需）
      - name: 配置JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 配置Gradle环境，无需本地gradlew文件
      - name: 配置Gradle环境
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.2"
          cache: true

      # 编译打包Debug APK（可直接安装，无需签名）
      - name: 编译打包APK
        run: gradle assembleDebug --stacktrace

      # 上传打包好的APK产物
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: ScanMaster-扫描王-APK
          path: app/build/outputs/apk/debug/app-debug.apk
